<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortLink++ | 프리미엄 URL 단축</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Top Auth Placeholder (Like the reference image) -->
    <div class="top-nav" id="auth-nav">
        <!-- JS로 동적 렌더링 -->
    </div>

    <!-- Login Modal -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-content glass-container" style="text-align: center;">
            <button class="close-btn" id="close-modal"><i class="fas fa-times"></i></button>
            <h2 id="modal-title" style="margin-bottom: 0.5rem;">ShortLink++ 시작하기</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem;">단 1초만에 안전하게 가입하고<br>프리미엄 기능을
                무료로 사용하세요!</p>

            <!-- Google Sign-In Button Container -->
            <div id="g_id_onload"
                data-client_id="909229247497-g0oebpva4hkqni620nucef450pj9lvu1.apps.googleusercontent.com"
                data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse"
                data-auto_prompt="false">
            </div>

            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
                data-text="signin_with" data-size="large" data-logo_alignment="left"
                style="display: flex; justify-content: center; margin-bottom: 1rem;">
            </div>

            <div class="auth-error hidden" id="auth-error-msg" style="margin-top: 1rem;"></div>
        </div>
    </div>

    <!-- My URLs Modal -->
    <div id="my-urls-modal" class="modal hidden">
        <div class="modal-content glass-container" style="max-width: 700px; width: 90%; padding: 2rem;">
            <button class="close-btn" id="close-my-urls"><i class="fas fa-times"></i></button>
            <h2 id="my-urls-title" style="margin-bottom: 1.5rem; color: var(--primary-dark);"><i
                    class="fas fa-link"></i> 내 URL 목록</h2>
            <div id="my-urls-list" class="my-urls-list">
                <!-- JS로 동적 렌더링 -->
            </div>
        </div>
    </div>

    <!-- Stats Modal (Chart) -->
    <div id="stats-modal" class="modal hidden">
        <div class="modal-content glass-container" style="max-width: 800px; width: 90%; padding: 2rem;">
            <button class="close-btn" id="close-stats"><i class="fas fa-times"></i></button>
            <h2 id="stats-title" style="margin-bottom: 0.5rem; color: var(--primary-dark);"><i
                    class="fas fa-chart-line"></i> 통계 그래프</h2>
            <p id="stats-subtitle" style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem;">단축 URL의
                일별 클릭 추이</p>
            <div class="chart-container" style="position: relative; height:40vh; width:100%">
                <canvas id="statsChart"></canvas>
            </div>
        </div>
    </div>

    <div class="app-wrapper">
        <header class="hero-header">
            <h1 class="logo-title">
                <a href="/" style="font-size: 0.8rem; vertical-align: middle; margin-right: 15px; color: var(--primary-light); text-decoration: none; border: 1px solid; padding: 4px 8px; border-radius: 6px;">🏠 허브 홈</a>
                Short<span class="logo-accent">Link++</span>
            </h1>
            <p class="subtitle">단축 기간을 24시간, 48시간, 1주일, 1개월 중 선택할 수 있습니다.<br>
                <span class="highlight-text"><i class="fas fa-info-circle"></i> 회원가입 시 <strong>영구적인</strong> 단축 URL을 생성할
                    수 있습니다!</span>
            </p>
        </header>

        <main class="glass-container">
            <form id="shortener-form">

                <div class="main-input-wrapper">
                    <input type="url" id="url-input" placeholder="긴 URL을 입력하세요 (https://...)" required>
                </div>

                <div class="advanced-section">
                    <div class="custom-code-box">
                        <span class="prefix">숏.한국/</span>
                        <input type="text" id="custom-code" placeholder="단축코드 (선택)">
                    </div>
                    <button type="submit" id="submit-btn">
                        <i class="fas fa-magic"></i> 단축하기
                    </button>
                </div>

                <div class="expiry-options">
                    <label class="expiry-chip">
                        <input type="radio" name="expiry" value="24h" checked>
                        <span>24시간</span>
                    </label>
                    <label class="expiry-chip">
                        <input type="radio" name="expiry" value="48h">
                        <span>48시간</span>
                    </label>
                    <label class="expiry-chip">
                        <input type="radio" name="expiry" value="1w">
                        <span>1주일</span>
                    </label>
                    <label class="expiry-chip">
                        <input type="radio" name="expiry" value="1m">
                        <span>1개월</span>
                    </label>
                    <label class="expiry-chip">
                        <input type="radio" name="expiry" value="unlimited">
                        <span>무제한 (회원)</span>
                    </label>
                </div>
            </form>

            <div id="result-layer" class="result-layer hidden">
                <div class="success-icon"><i class="fas fa-check-circle"></i></div>
                <h3>단축 완료!</h3>
                <div class="result-box">
                    <input type="text" id="short-url" readonly>
                    <button id="copy-btn" class="icon-btn tooltip" data-tooltip="복사하기">
                        <i class="far fa-copy"></i>
                    </button>
                </div>

                <div class="qr-action">
                    <button id="qr-toggle-btn" class="text-btn"><i class="fas fa-qrcode"></i> QR 코드 보기</button>
                    <div id="qr-container" class="qr-container hidden">
                        <img id="qr-image" src="" alt="QR Code">
                    </div>
                </div>

                <button id="reset-btn" class="outline-btn">새로운 URL 단축하기</button>
            </div>

            <div id="error-msg" class="error-toast hidden"></div>
        </main>

        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-number" id="val-total">0</div>
                <div class="stat-label">활성 URL</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="val-today">0</div>
                <div class="stat-label">오늘 생성</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="val-clicks">0</div>
                <div class="stat-label">누적 클릭</div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
